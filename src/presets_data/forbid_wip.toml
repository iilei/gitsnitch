[[assertions]]
alias = "preset_forbid_wip"
description = "Disallow work-in-progress commit titles"
banner = "Commit title must not start with WIP.\n\nCommits:\n{% for v in violations %}{% if v.assertion_alias == violation.assertion_alias %}- {{ v.commit_sha_short }}\n{% endif %}{% endfor %}"
hint = "Replace the WIP prefix with the actual change intent before committing."
severity = 60

[assertions.must_satisfy]
[assertions.must_satisfy.condition]
type = "msg_match_none"
mode = "title"
patterns = ["(?i)^\\s*wip\\b"]
