t="spacing" textLength="82.8621" x="1010.5" y="324.9649">Exit behavior:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1921" x="1010.5" y="342.6709">- no violations =&gt; exit 0</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.3002" x="1010.5" y="360.377">- violations and enabled =&gt; max violation severity</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.5402" x="1010.5" y="378.083">- violations and disabled =&gt; exit 0</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="344.9423" x="1010.5" y="395.789">- internal/runtime errors =&gt; reserved exit range 251..255</text><g class="entity" data-qualified-name="GMN11" data-source-line="59" id="ent0012"><path d="M87,70.0679 L87,186.304 A0,0 0 0 0 87,186.304 L399.7463,186.304 A0,0 0 0 0 399.7463,186.304 L399.7463,132.0679 L435.39,128.0679 L399.7463,124.0679 L399.7463,80.0679 L389.7463,70.0679 L87,70.0679 A0,0 0 0 0 87,70.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M389.7463,70.0679 L389.7463,80.0679 L399.7463,80.0679 L389.7463,70.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.1922" x="93" y="88.9649">CustomMeta constraints:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78.5591" x="93" y="106.6709">- type: object</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119.0281" x="93" y="124.377">- maxProperties: 16</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.5642" x="93" y="142.083">- propertyNames pattern: ^[a-zA-Z0-9_]+$</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdj