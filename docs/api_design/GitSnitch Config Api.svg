ans-serif" font-size="13" lengthAdjust="spacing" textLength="140.1921" x="1010.5" y="342.6709">- no violations =&gt; exit 0</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.3002" x="1010.5" y="360.377">- violations and enabled =&gt; max violation severity</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.5402" x="1010.5" y="378.083">- violations and disabled =&gt; exit 0</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="344.9423" x="1010.5" y="395.789">- internal/runtime errors =&gt; reserved exit range 251..255</text><g class="entity" data-qualified-name="GMN11" data-source-line="59" id="ent0012"><path d="M87,70.0679 L87,186.304 A0,0 0 0 0 87,186.304 L399.7463,186.304 A0,0 0 0 0 399.7463,186.304 L399.7463,132.0679 L435.39,128.0679 L399.7463,124.0679 L399.7463,80.0679 L389.7463,70.0679 L87,70.0679 A0,0 0 0 0 87,70.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M389.7463,70.0679 L389.7463,80.0679 L399.7463,80.0679 L389.7463,70.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.1922" x="93" y="88.9649">CustomMeta constraints:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="78.5591" x="93" y="106.6709">- type: object</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119.0281" x="93" y="124.377">- maxProperties: 16</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.5642" x="93" y="142.083">- propertyNames pattern: ^[a-zA-Z0-9_]+$</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.7463" x="93" y="159.789">- additionalProperties: string (maxLength: 2048)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="67.4831" x="93" y="177.495">- default: {}</text></g><path d="M587,46.0679 L587,126.892 A0,0 0 0 0 587,126.892 L871.9263,126.892 A0,0 0 0 0 871.9263,126.892 L871.9263,90.4799 L911.5,125.1019 L871.9263,82.4799 L871.9263,56.0679 L861.9263,46.0679 L587,46.0679 A0,0 0 0 0 587,46.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M861.9263,46.0679 L861.9263,56.0679 L871.9263,56.0679 L861.9263,46.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.4822" x="593" y="64.9649">Shallow history auto-heal mode:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.7031" x="593" y="82.6709">- never: no history fetch</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.9263" x="593" y="100.377">- full: fetch complete history in one attempt</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.4842" x="593" y="118.083">- incremental: deepen in repeated tries</text><path d="M587,136.892 L587,200.01 A0,0 0 0 0 587,200.01 L869.2482,200.01 A0,0 0 0 0 869.2482,200.01 L869.2482,172.451 L911.5,144.1698 L869.2482,164.451 L869.2482,146.892 L859.2482,136.892 L587,136.892 A0,0 0 0 0 587,136.892" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M859.2482,136.892 L859.2482,146.892 L869.2482,146.892 L859.2482,136.892" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.2482" x="593" y="155.789">Incremental deepening uses fixed factor 2:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.7352" x="593" y="173.495">step(i) = autoheal_shallow_shift * 2